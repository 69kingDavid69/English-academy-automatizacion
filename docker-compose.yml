services:

  # ChromaDB vector store
  chromadb:
    image: chromadb/chroma:latest
    container_name: academy-chromadb
    ports:
      - "${CHROMA_HOST_PORT:-8000}:8000"
    volumes:
      - chroma_data:/data
    environment:
      - CHROMA_ALLOW_RESET=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8000"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 6

  # n8n workflow automation
  n8n:
    image: n8nio/n8n:latest
    container_name: academy-n8n
    ports:
      - "${N8N_HOST_PORT:-5678}:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_SECURE_COOKIE=false
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678}
      - BACKEND_HOSTPORT=${BACKEND_HOSTPORT:-host.docker.internal:3000}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-changeme}
      - GENERIC_TIMEZONE=America/Bogota
      - TZ=America/Bogota
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows:ro
    restart: unless-stopped
    depends_on:
      chromadb:
        condition: service_healthy

volumes:
  chroma_data:
    driver: local
  n8n_data:
    driver: local
